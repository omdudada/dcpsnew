<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DCPS Nashik Municipal Corporation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
    <div class="login-box">
        <div class="login-logo">
            <div class="circle">NMC</div>
            <h2>Nashik Municipal Corporation<br><small style="font-size:14px;color:#888;">DCPS Management System</small></h2>
        </div>
        <h3>Admin Panel Login</h3>

        <div class="alert alert-danger" id="err-msg" style="display:none;">
            <strong>Error:</strong> Invalid username or password.
        </div>

        <form action="#" method="post" id="loginform" autocomplete="off" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">Username <span style="color:red">*</span></label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter username">
                <p id="err-username" style="color:red;font-size:12px;margin-top:3px;display:none;">Username is required.</p>
            </div>
            <div class="form-group">
                <label for="password">Password <span style="color:red">*</span></label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter password">
                <p id="err-password" style="color:red;font-size:12px;margin-top:3px;display:none;">Password is required.</p>
            </div>
            <div class="form-group" style="text-align:right;">
                <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;">Login</button>
            </div>
        </form>
    </div>
</div>
<script>
function handleLogin(e) {
    e.preventDefault();
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value.trim();
    var ok = true;
    document.getElementById('err-username').style.display = u ? 'none' : 'block'; if(!u) ok=false;
    document.getElementById('err-password').style.display = p ? 'none' : 'block'; if(!p) ok=false;
    if (ok) { window.location.href = 'dashboard.html'; }
}
</script>
</body>
</html>
